name: NeMo Unit Tests
'on':
  workflow_call:
    inputs:
      test_to_run:
        required: true
        type: string
jobs:
  collections-common-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
        - script: L0_Unit_Tests_GPU_Common
          runner: ubuntu-latest
        - script: L0_Unit_Tests_CPU_Common
          runner: ubuntu-latest
          cpu-only: true
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.script }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: ${{ github.run_id }}
    - name: main
      uses: NVIDIA/NeMo/.github/actions/test-template@main
      with:
        runner: ${{ runner.name }}
        script: ${{ matrix.script }}
        is_unit_test: true
        tests_to_run: ${{ inputs.test_to_run }}
        cpu-only: ${{ matrix.cpu-only || false }}
  collections-llm-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
        - script: L0_Unit_Tests_GPU_LLM
